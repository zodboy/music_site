name: Build iOS (unsigned)

# Builds an UNSIGNED .ipa for sideloading via AltStore / SideStore.
# The .ipa is unsigned on purpose — AltStore/SideStore will sign it
# on-device using the user's personal Apple ID.
#
# Repo layout: this repo IS the music_site project (no nested music_site/ folder).
# All paths below are relative to the repo root.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "api/**"
      - ".env.mobile"
      - "capacitor.config.ts"
      - "ios/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-ios.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "MARKETING_VERSION override (e.g. 0.2.0)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 30

    env:
      SCHEME: App
      PROJECT: ios/App/App.xcodeproj
      ARCHIVE_PATH: build/App.xcarchive
      IPA_PATH: build/App-unsigned.ipa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci || npm install

      - name: Build web assets (mobile mode)
        run: npm run build:mobile

      - name: Select Xcode (before cap sync)
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          xcodebuild -showBuildSettings 2>&1 | head -5

      - name: Sync to iOS project
        run: |
          mkdir -p build
          set -x
          npx cap copy ios 2>&1 | tee build/cap-copy.log
          npx cap sync ios 2>&1 | tee build/cap-sync.log
          exit ${PIPESTATUS[0]}

      - name: Upload cap-sync log (on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cap-sync-log
          path: |
            build/cap-copy.log
            build/cap-sync.log
          if-no-files-found: warn
          retention-days: 7

      - name: Override MARKETING_VERSION (if provided)
        if: ${{ github.event.inputs.version != '' }}
        run: |
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ github.event.inputs.version }}/g" \
            ios/App/App.xcodeproj/project.pbxproj

      - name: List schemes & SPM packages
        run: |
          echo "===== Available schemes ====="
          xcodebuild -list -project ${{ env.PROJECT }} 2>&1 | tee build/xcodebuild-list.log
          echo "============================"
          echo "===== Package.swift content ====="
          cat ios/App/CapApp-SPM/Package.swift
          echo "=================================="

      - name: Archive WITHOUT signing
        run: |
          mkdir -p build
          set -o pipefail
          # Also normalize Windows backslashes in Package.swift (generated on Windows dev machine)
          sed -i '' 's|\\|/|g' ios/App/CapApp-SPM/Package.swift || true
          echo "===== Package.swift after sed ====="
          cat ios/App/CapApp-SPM/Package.swift
          echo "==================================="
          xcodebuild archive \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            2>&1 | tee build/xcodebuild-archive.log

      - name: Extract build errors (diagnostic)
        if: always()
        run: |
          if [ -f build/xcodebuild-archive.log ]; then
            echo "===== Last 60 lines of xcodebuild log ====="
            tail -60 build/xcodebuild-archive.log
            echo "============================================"
            echo "===== Lines containing 'error' (case-insensitive) ====="
            grep -i "error" build/xcodebuild-archive.log | tail -20 || echo "(no error lines found)"
            echo "======================================================"
            # Emit as GitHub Actions annotations (visible via public annotations API)
            grep -i "error" build/xcodebuild-archive.log | tail -10 | while IFS= read -r line; do
              # Strip ANSI color codes and truncate to 250 chars (GitHub annotation limit)
              clean=$(echo "$line" | sed 's/\x1b\[[0-9;]*m//g' | cut -c1-250)
              echo "::error::$clean"
            done
          else
            echo "No xcodebuild-archive.log found"
          fi

      - name: Package unsigned .ipa
        run: |
          # Locate .app inside .xcarchive
          APP_DIR=$(find ${{ env.ARCHIVE_PATH }}/Products/Applications -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "ERROR: No .app found in archive"
            exit 1
          fi
          echo "Found app: $APP_DIR"

          # Build Payload/ directory and copy .app in
          PAYLOAD_DIR=build/Payload
          rm -rf "$PAYLOAD_DIR"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_DIR" "$PAYLOAD_DIR/"

          # Zip as .ipa (zip -r -X preserves structure)
          rm -f ${{ env.IPA_PATH }}
          cd build
          zip -r -X App-unsigned.ipa Payload
          cd ..

          ls -lh ${{ env.IPA_PATH }}

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicSite-ios-unsigned
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-archive-log
          path: build/xcodebuild-archive.log
          if-no-files-found: warn
          retention-days: 7
